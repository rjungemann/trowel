name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Required for manual runs.'
        required: true

jobs:
  macos:
    name: Build, sign, notarize macOS
    runs-on: macos-14
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Strip leading v from tag
        id: version
        run: |
          raw="${VERSION#v}"
          echo "version=${raw}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: brew install cmake ninja qt@6

      - name: Import Developer ID certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "==> Installing Apple intermediate CAs"
          curl -fsSL -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"    https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -fsSL -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"  https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -fsSL -o "$RUNNER_TEMP/AppleRootCA-G2.cer"   https://www.apple.com/certificateauthority/AppleRootCA-G2.cer
          curl -fsSL -o "$RUNNER_TEMP/AppleRootCA-G3.cer"   https://www.apple.com/certificateauthority/AppleRootCA-G3.cer
          for cer in "$RUNNER_TEMP"/*.cer; do
            security import "$cer" -k "$KEYCHAIN" -T /usr/bin/codesign || true
          done

          echo "==> Importing Developer ID certificate"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          LOGIN_KC="$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user -s "$KEYCHAIN" "$LOGIN_KC"
          security default-keychain -s "$KEYCHAIN"

          echo "==> All identities in $KEYCHAIN"
          security find-identity -v "$KEYCHAIN"
          echo "==> Codesigning-valid identities in $KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DTROWEL_CODESIGN_IDENTITY="$CODESIGN_IDENTITY"

      - name: Build
        run: |
          LOGIN_KC="$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user -s "$KEYCHAIN" "$LOGIN_KC"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security find-identity -v -p codesigning
          cmake --build build

      - name: Store notarization credentials
        run: |
          xcrun notarytool store-credentials trowel-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Notarize and staple
        run: scripts/notarize-app.sh build/trowel.app trowel-notary

      - name: Package release zip
        id: package
        run: |
          VERSION_STRIPPED='${{ steps.version.outputs.version }}'
          OUT="dist/Trowel-${VERSION_STRIPPED}.zip"
          mkdir -p dist
          rm -f "$OUT"
          ditto -c -k --keepParent build/trowel.app "$OUT"
          SHA=$(shasum -a 256 "$OUT" | awk '{print $1}')
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "## Trowel ${VERSION_STRIPPED}" > dist/notes.md
          echo "" >> dist/notes.md
          echo "**SHA-256:** \`$SHA\`" >> dist/notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Trowel ${{ steps.version.outputs.version }}
          body_path: dist/notes.md
          files: ${{ steps.package.outputs.path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

      - name: Update Homebrew cask on main
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
          NEW_SHA: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          CASK=Casks/trowel.rb

          # Work on a fresh checkout of main so the tagged-ref checkout above
          # doesn't turn into a detached-HEAD push. Use the token the
          # workflow already has (contents: write).
          git config user.name "trowel-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main

          python3 - "$CASK" "$NEW_VERSION" "$NEW_SHA" <<'PY'
          import re, sys, pathlib
          path, version, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          p = pathlib.Path(path)
          src = p.read_text()
          src = re.sub(r'^(\s*version\s+)"[^"]*"', rf'\1"{version}"', src, count=1, flags=re.M)
          src = re.sub(r'^(\s*sha256\s+)"[^"]*"', rf'\1"{sha}"',    src, count=1, flags=re.M)
          p.write_text(src)
          PY

          if git diff --quiet -- "$CASK"; then
              echo "cask already up to date; nothing to commit"
              exit 0
          fi

          git add "$CASK"
          git commit -m "chore: update cask for v${NEW_VERSION}

          Automated cask bump from the release workflow. Points at
          Trowel-${NEW_VERSION}.zip with SHA-256 ${NEW_SHA}."

          # Small retry loop in case someone pushed to main between the
          # tag build starting and this commit landing.
          for attempt in 1 2 3; do
              if git push origin main; then
                  exit 0
              fi
              echo "push failed (attempt $attempt), rebasing on latest main"
              git fetch origin main
              git rebase origin/main
          done
          echo "failed to push cask update after 3 attempts" >&2
          exit 1

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN:-}" ]; then
            security delete-keychain "$KEYCHAIN" || true
          fi

  linux:
    name: Build AppImage (${{ matrix.arch }})
    # Gate behind the macOS job, which creates the GitHub Release. These jobs
    # then only append their AppImage assets, so there's no create-vs-update
    # race on the release. (If you ever want Linux to ship even when macOS
    # fails, split the release-creation into its own job like Turmeric does.)
    needs: macos
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ curl file desktop-file-utils \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev libxkbcommon-dev \
            libedit2

      - name: Build AppImage
        run: scripts/build-appimage.sh ${{ matrix.arch }}

      - name: Smoke-test the AppImage (headless, bundled Qt + Turmeric)
        run: |
          python3 -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install -q pytest
          APP=$(ls dist/Trowel-*-${{ matrix.arch }}.AppImage)
          ( cd "$RUNNER_TEMP" && APPIMAGE_EXTRACT_AND_RUN=1 "$GITHUB_WORKSPACE/$APP" --appimage-extract >/dev/null )
          cd tests/smoke
          env -u TUR_STDLIB_DIR \
            TROWEL_BIN="$RUNNER_TEMP/squashfs-root/AppRun" \
            PATH="/usr/bin:/bin" \
            /tmp/smoke-venv/bin/python -m pytest -q

      - name: Checksum
        id: pkg
        run: |
          APP=$(ls dist/Trowel-*-${{ matrix.arch }}.AppImage)
          sha256sum "$APP" | awk '{print $1}' > "${APP}.sha256"
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat "${APP}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Publish AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            ${{ steps.pkg.outputs.path }}
            ${{ steps.pkg.outputs.path }}.sha256
          fail_on_unmatched_files: true
